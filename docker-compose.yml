version: '3.8'

services:
  lobster-xhs:
    build: .
    container_name: lobster-xhs-bot
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 可选：使用Redis作为消息队列
  redis:
    image: redis:7-alpine
    container_name: lobster-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - with-redis

volumes:
  redis_data:
